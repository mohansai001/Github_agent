name: Build Push and Deploy Container App

on:
  push:
    branches:
      - Github_agent

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: github-agent

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/github-agent:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/github-agent:latest .

      - name: Push Latest Image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/github-agent:latest

      - name: Push Versioned Image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/github-agent:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ghcr.io/${{ github.repository_owner }}/github-agent:${{ github.sha }}

      - name: Show Container App URL
        run: |
          az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv
