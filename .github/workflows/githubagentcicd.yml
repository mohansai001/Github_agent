name: Build and Push Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/github-agent:latest .

      - name: Push Docker Image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/github-agent:latest

      - name: Verify Image
        run: |
          echo "Image pushed successfully:"
          echo "ghcr.io/${{ github.repository_owner }}/github-agent:latest"
